<!DOCTYPE html>
<html>
<head>
<title>Event Registration</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Event Registration Form</h2>

<form id="registrationForm">

<label>Name</label>
<input type="text" id="name">

<br><br>

<label>Email</label>
<input type="text" id="email">

<br><br>

<label>Phone Number</label>
<input type="text" id="phone">

<br><br>

<label>Date of Birth</label>
<input type="date" id="dob">

<br><br>

<label>Gender</label><br>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female

<br><br>

<label>Select Event</label>
<select id="event">
<option value="">Select Event</option>
<option value="Coding">Coding</option>
<option value="Web Design">Web Design</option>
<option value="AI Workshop">AI Workshop</option>
</select>

<br><br>

<label>Mode of Participation</label><br>
<input type="radio" name="mode" value="Online"> Online
<input type="radio" name="mode" value="Offline"> Offline

<br><br>

<label>College / Company</label>
<input type="text" id="college">

<br><br>

<input type="checkbox" id="confirm">
I confirm that the above details are correct.

<br><br>

<button type="submit">Register</button>

<p id="message"></p>

</form>

<h3>Registered Participants</h3>

<p>Total Participants: <span id="count">0</span></p>

<table border="1" id="participantsTable">

<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Event</th>
<th>Mode</th>
<th>Action</th>
</tr>

</table>

<script src="script.js"></script>

</body>
</html>
