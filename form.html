<!DOCTYPE html>
<html>
<head>
<title>Event Registration</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
padding:20px;
}

.container{
width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:8px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

table,th,td{
border:1px solid #ccc;
}

th,td{
padding:10px;
text-align:center;
}

.success{
color:green;
text-align:center;
margin-top:10px;
}

.valid{
border:2px solid green;
}

.invalid{
border:2px solid red;
}

</style>

</head>

<body>

<div class="container">

<h2>Event Registration Form</h2>

<form id="regForm">

<label>Name</label>
<input type="text" id="name" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Phone</label>
<input type="tel" id="phone" required>

<label>Event Type</label>
<select id="event">
<option value="">Select Event</option>
<option>Workshop</option>
<option>Seminar</option>
<option>Hackathon</option>
</select>

<label>
<input type="checkbox" id="confirm"> I confirm that the above details are correct
</label>

<button type="submit">Register</button>

</form>

<div id="message"></div>

<h3>Registered Participants</h3>

<table id="table">
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Event</th>
<th>Action</th>
</tr>
</table>

</div>

<script>

const form=document.getElementById("regForm");
const table=document.getElementById("table");
const message=document.getElementById("message");

form.addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name");
let email=document.getElementById("email");
let phone=document.getElementById("phone");
let event=document.getElementById("event");
let confirm=document.getElementById("confirm");

let valid=true;

function check(input){
if(input.value.trim()==""){
input.classList.add("invalid");
input.classList.remove("valid");
valid=false;
}else{
input.classList.add("valid");
input.classList.remove("invalid");
}
}

check(name);
check(email);
check(phone);
check(event);

if(!confirm.checked){
alert("Please confirm the declaration");
return;
}

if(!valid){
alert("Please fill all fields correctly");
return;
}

let row=table.insertRow();

row.insertCell(0).innerText=name.value;
row.insertCell(1).innerText=email.value;
row.insertCell(2).innerText=phone.value;
row.insertCell(3).innerText=event.value;

let action=row.insertCell(4);
let delBtn=document.createElement("button");
delBtn.innerText="Delete";

delBtn.onclick=function(){
table.deleteRow(row.rowIndex);
}

action.appendChild(delBtn);

message.innerHTML="Registration Successful!";
message.className="success";

setTimeout(()=>{
message.innerHTML="";
},3000);

form.reset();

let inputs=document.querySelectorAll("input,select");
inputs.forEach(i=>{
i.classList.remove("valid");
});

});

</script>

</body>
</html>
